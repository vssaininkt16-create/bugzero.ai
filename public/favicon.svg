  <line x1="50" y1="30" x2="58" y2="22" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bug legs left -->
  <line x1="38" y1="50" x2="26" y2="46" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="55" x2="26" y2="54" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="60" x2="26" y2="64" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bug legs right -->
  <line x1="62" y1="50" x2="74" y2="46" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62" y1="55" x2="74" y2="54" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62" y1="60" x2="74" y2="64" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
